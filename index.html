<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Author: Roman Pavlenko, GitHub: https://github.com/DraftRoman/Project-TV-Show the Project-TV-Show as a part of portfolio"
    />
    <title>TV Show Project | Roman (DraftRoman)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <header class="header" role="navigation">
      <h1>TV Show Project</h1>

      <div class="episode-div" id="episode-div">
        <button id="return-button"><<</button>
        <div id="show-selector-container">
          <label>
            <p class="selector-show">Show selector</p>
            <select id="show-selector">
              <option value="all-shows">All shows</option>
            </select>
          </label>
        </div>
        <div id="episode-selector-container">
          <label>
            <p class="selector-p">Episode selector</p>
            <select id="episode-selector">
              <option value="all-episodes">All episodes</option>
            </select>
          </label>
        </div>
        <label>
          <p id="search-p">Search</p>
          <input
            type="search"
            id="search-input"
            name="search-input"
            placeholder="Search..."
          />
        </label>
        <div id="result-count"></div>
      </div>
    </header>
    <section id="root" role="main">
      <div id="loading">🧪 Cooking up the episode list…</div>
      <div id="error"></div>
    </section>

    <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->

    <!-- Loads YOUR javascript code -->
    <footer role="contentinfo">
      <p>
        <a href="https://www.tvmaze.com/api" class="link" target="_blank"
          >TV shows</a
        >
        Presented by Roman with love
      </p>
    </footer>
    <script type="module" src="script.js"></script>
  </body>
</html>
